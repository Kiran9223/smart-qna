name: Notification Worker CI/CD

on:
  push:
    branches: [main]
    paths:
      - "lambda/notification_worker/**"
      - "infra/terraform/**"
      - ".github/workflows/notification-worker-ci.yml"
  workflow_dispatch:

jobs:
  terraform-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5
      - name: Terraform fmt check
        run: terraform fmt -check -recursive
      - name: Terraform init (no backend)
        run: terraform init -backend=false
      - name: Terraform validate
        run: terraform validate

  build-and-push-worker:
    needs: terraform-validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      AWS_REGION: us-east-1
      ECR_NOTIFICATION_WORKER_REPO: 223759445056.dkr.ecr.us-east-1.amazonaws.com/smart-qna-prod-notification-worker
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - name: Build notification worker image
        run: docker build -t notification-worker ./lambda/notification_worker
      - name: Tag image
        run: |
          docker tag notification-worker:latest $ECR_NOTIFICATION_WORKER_REPO:latest
          docker tag notification-worker:latest $ECR_NOTIFICATION_WORKER_REPO:${{ github.sha }}
      - name: Push image to ECR
        run: |
          docker push $ECR_NOTIFICATION_WORKER_REPO:latest
          docker push $ECR_NOTIFICATION_WORKER_REPO:${{ github.sha }}
