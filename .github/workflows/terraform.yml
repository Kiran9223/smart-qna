name: Terraform Infrastructure

on:
  push:
    branches: [main]
    paths: [terraform/**, .github/workflows/terraform.yml]
  pull_request:
    branches: [main]
    paths: [terraform/**, .github/workflows/terraform.yml]
  workflow_dispatch:

env:
  TF_WORKING_DIR: ./terraform

jobs:
  # ── Validate on every push/PR touching terraform/ ─────────────────────────
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-1

      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Format check
        run: terraform fmt -check -recursive
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}

  # ── Plan + Apply on push to main or manual trigger ────────────────────────
  apply:
    needs: validate
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-1

      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      # Show the plan in the logs before applying
      - name: Terraform Plan
        run: terraform plan -no-color -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_secret_key: ${{ secrets.SECRET_KEY }}
          TF_VAR_db_url: ${{ secrets.DATABASE_URL }}
          TF_VAR_sqs_queue_url: ${{ secrets.SQS_QUEUE_URL }}

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_secret_key: ${{ secrets.SECRET_KEY }}
          TF_VAR_db_url: ${{ secrets.DATABASE_URL }}
          TF_VAR_sqs_queue_url: ${{ secrets.SQS_QUEUE_URL }}
